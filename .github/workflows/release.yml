name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build
    - name: Build wheel and sdist
      run: |
        python -m build
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.2
    - name: Build Android Release
      run: |
        cd android
        gradle assembleRelease
    - name: Prepare APK for Release
      run: |
        TAG_NAME=${GITHUB_REF#refs/tags/}
        APK_SRC=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
        if [ -f "$APK_SRC" ]; then
          cp "$APK_SRC" "dist/ssl-tun-tunnel-${TAG_NAME}.apk"
          echo "APK prepared: dist/ssl-tun-tunnel-${TAG_NAME}.apk"
        else
          echo "Warning: APK not found"
        fi
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
